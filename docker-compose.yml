version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    command: [ "celery", "-A", "app.workers.celery_app:celery_app", "beat", "--loglevel=info" ]
    env_file:
      - .env
    depends_on:
      - redis

  ai:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai
    ports:
      - "8001:8001"
    env_file:
      - .env

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  flower:
    image: mher/flower
    command: [ "celery", "--broker=redis://redis:6379/1", "flower" ]
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  pgdata:


